name: Bug report
description: Something is not working correctly.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please fill in as much as you can — GPU bugs are notoriously
        environment-sensitive and every field here matters.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Run `cargo metadata --no-deps` and fill in the relevant parts.
      placeholder: |
        - OS + version:
        - GPU + driver version:
        - wgpu backend (Vulkan / Metal / DX12 / GL):
        - Byard version / git SHA:
        - Rust version (`rustc --version`):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or panic output
      render: text
