[package]
name = "byard-core"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
bumpalo = "3"
taffy = "0.10"
rustc-hash = "2"
smallvec = "1"
wgpu = "29.0"
bytemuck = { version = "1.14", features = ["derive"] }
glyphon = "0.11"

[dev-dependencies]
# Visual verification example (examples/hello_world.rs).
# winit 0.30 is required for the `ApplicationHandler` API and for
# `create_surface` without `unsafe` (wgpu 24 + winit 0.30 co-released).
winit = "0.30"
# Minimal async executor for blocking on `Engine::init` inside `main`.
pollster = "0.3"

[lints]
workspace = true

[[bench]]
name = "evaluator"
harness = false

[[bench]]
name = "atlas"
harness = false

[[bench]]
name = "spatial"
harness = false
